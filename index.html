<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Hana 🎂</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

body{
  background:linear-gradient(135deg,#ffd6e0,#ffeaf4);
  overflow:hidden;
}

/* GLOW */
body::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle, rgba(255,77,109,0.2), transparent);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* SCREEN */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
  padding:20px;
}
.active{display:flex;}

/* FLOATING CARD */
.card{
  background:rgba(255,255,255,0.4);
  backdrop-filter:blur(18px);
  border-radius:20px;
  padding:22px;
  max-width:350px;
  width:90%;
  text-align:center;
  z-index:3;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
  animation:float 4s ease-in-out infinite;
}

/* FLOAT ANIMATION */
@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
  100%{transform:translateY(0);}
}

/* TEXT */
h1{color:#ff4d6d;}
p{color:#444;margin-top:10px;line-height:1.4;}

/* BUTTON */
button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
  transition:0.2s;
}
button:hover{transform:scale(1.05);}

/* FOTO */
#photo{
  width:220px;
  border-radius:15px;
  filter:blur(10px);
  transform:scale(1.05);
  transition:1.5s;
}
#photo.clear{
  filter:blur(0);
  transform:scale(1);
}

/* VIDEO */
.side-video{
  position:absolute;
  left:5%;
  width:200px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* FOTO KANAN */
.side-img{
  position:absolute;
  right:5%;
  width:180px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* MOBILE */
@media (max-width:768px){

  body{overflow:hidden;}

  .screen{
    justify-content:center;
  }

  .side-video{
    top:10%;
    width:70%;
  }

  .side-img{
    bottom:10%;
    width:70%;
  }

  #photo{
    width:75%;
  }
}

/* PLAYER */
.music-player{
  position:fixed;
  bottom:15px;
  left:15px;
  background:rgba(255,255,255,0.4);
  backdrop-filter:blur(10px);
  padding:10px 14px;
  border-radius:20px;
  display:flex;
  gap:10px;
  z-index:10;
}

.music-player img{
  width:40px;
  border-radius:50%;
  animation:spin 8s linear infinite, pulse 2s infinite;
  animation-play-state: paused;
}

@keyframes spin{
  from{transform:rotate(0);}
  to{transform:rotate(360deg);}
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

/* POPUP */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:20;
}
.popup img{
  max-width:90%;
}
</style>
</head>

<body>

<audio id="bgm" loop>
  <source src="lagu.mp3">
</audio>

<div class="music-player">
  <img src="cover.jpg" id="cover">
  <div><p>Risk It All</p></div>
</div>

<div class="popup" id="popup" onclick="closePopup()">
  <img id="popupImg">
</div>

<!-- S1 -->
<div id="s1" class="screen active">
  <div class="card">
    <h1>🎂 Happy Birthday Hana</h1>
    <p id="text1"></p>
    <button onclick="next()">open</button>
  </div>
</div>

<!-- S2 -->
<div id="s2" class="screen">
  <div class="card">
    <p id="text2"></p>
    <button onclick="next()">next</button>
  </div>
</div>

<!-- S3 -->
<div id="s3" class="screen">

  <video src="vid.mp4" class="side-video" autoplay muted loop playsinline onclick="toggleVideo(this)"></video>

  <div class="card">
    <img id="photo" src="hana.jpg" onclick="openPopup(this.src)">
    <p id="text3"></p>
    <button onclick="next()">next</button>
  </div>

  <img src="hana2.jpeg" class="side-img" onclick="openPopup(this.src)">

</div>

<!-- S4 -->
<div id="s4" class="screen">
  <div class="card">
    <p id="text4"></p>
    <button onclick="next()">next</button>
  </div>
</div>

<!-- S5 -->
<div id="s5" class="screen">
  <div class="card">
    <p id="text5"></p>
    <button onclick="next()">last</button>
  </div>
</div>

<!-- S6 -->
<div id="s6" class="screen">
  <div class="card">
    <p id="text6"></p>
  </div>
</div>

<script>
let screens=["s1","s2","s3","s4","s5","s6"];
let current=0;

function show(i){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(screens[i]).classList.add("active");
}

function next(){
  if(current<screens.length-1){
    current++;
    show(current);
    runText();
  }
}

function typeEffect(t,id){
  let i=0;
  let el=document.getElementById(id);
  el.innerHTML="";
  function type(){
    if(i<t.length){
      el.innerHTML+=t[i];
      i++;
      setTimeout(type,30);
    }
  }
  type();
}

function runText(){
  if(current==0) typeEffect("I got something for you…","text1");
  if(current==1) typeEffect("Today is all about you.","text2");
  if(current==2){
    typeEffect("I don’t know why… but somehow, you’re still my favorite.","text3");
    document.getElementById("photo").classList.add("clear");
  }
  if(current==3) typeEffect("I hope all the good things find their way to you… not just today, but always.","text4");
  if(current==4) typeEffect("Sorry I couldn’t meet you… I had something to take care of, so I made this for you. Hope you like it🙂‍↔️","text5");
  if(current==5) typeEffect("Once again… Happy Birthday yaa swithirt. you mean more than I say🫶","text6");
}

function toggleVideo(v){ v.muted=!v.muted; }

function openPopup(src){
  document.getElementById("popupImg").src=src;
  document.getElementById("popup").style.display="flex";
}
function closePopup(){
  document.getElementById("popup").style.display="none";
}

runText();

let music=document.getElementById("bgm");
let cover=document.getElementById("cover");

document.body.addEventListener("click",()=>{
  music.play();
  cover.style.animationPlayState="running";
},{once:true});
</script>

</body>
</html>
