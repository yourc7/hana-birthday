<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Hana 🎂</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

body{
  height:100vh;
  overflow:hidden;
  background:linear-gradient(135deg,#ffd6e0,#ffeaf4);
}

/* OVERLAY */
body::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.1));
}

/* SCREEN */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.15);
  max-width:350px;
  width:90%;
  text-align:center;
  z-index:2;
}

/* TEXT */
h1{color:#ff4d6d;font-size:22px;}
p{margin-top:10px;color:#444;font-size:14px;line-height:1.5;}

/* BUTTON */
button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}

/* HIDDEN */
.hidden{
  opacity:0;
  pointer-events:none;
  transform:scale(0.95);
}

/* FOTO TENGAH */
#photo{
  width:70%;
  max-width:230px;
  border-radius:15px;
  filter:blur(12px);
  transition:2s;
}
#photo.clear{
  filter:blur(0);
}

/* VIDEO KIRI */
.side-video{
  position:absolute;
  width:200px;
  border-radius:15px;
  opacity:0;
  top:50%;
  left:6%;
  transform:translateY(-50%) translateX(-80px);
  transition:1s;
}

.side-video.show{
  opacity:0.85;
  transform:translateY(-50%) translateX(0);
}

/* FOTO KANAN */
.side-img{
  position:absolute;
  width:180px;
  border-radius:15px;
  opacity:0;
  top:50%;
  right:6%;
  transform:translateY(-50%) translateX(80px);
  transition:1s;
}

.side-img.show{
  opacity:0.85;
  transform:translateY(-50%) translateX(0);
}

/* PLAYER */
.music-player{
  position:fixed;
  bottom:15px;
  left:15px;
  display:flex;
  gap:10px;
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(10px);
  padding:8px 12px;
  border-radius:20px;
}

.music-player img{
  width:40px;
  height:40px;
  border-radius:50%;
  animation:spin 8s linear infinite;
  animation-play-state: paused;
}

@keyframes spin{
  from{transform:rotate(0);}
  to{transform:rotate(360deg);}
}

/* ================= MOBILE ================= */
@media (max-width:768px){

  body{overflow:auto;}

  .screen{
    flex-direction:column;
    padding:20px;
  }

  .side-video,
  .side-img{
    display:none;
  }

  #photo{
    width:85%;
  }

  h1{font-size:20px;}
  p{font-size:13px;}
}
</style>
</head>

<body>

<audio id="bgm" loop>
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<div class="music-player">
  <img src="cover.jpg" id="cover">
  <div>
    <h4>Risk It All</h4>
    <p>Bruno Mars</p>
  </div>
</div>

<!-- SCREEN 1 -->
<div id="s1" class="screen">
  <div class="card">
    <h1>🎂 Happy Birthday, Hana</h1>
    <p id="text1"></p>
    <button onclick="start()">open 🎁</button>
  </div>
</div>

<!-- SCREEN 2 -->
<div id="s2" class="screen hidden">
  <div class="card">
    <p id="text2"></p>
    <button onclick="toS3()">next →</button>
  </div>
</div>

<!-- SCREEN 3 -->
<div id="s3" class="screen hidden">

  <video src="vid.mp4" class="side-video" id="leftVid" autoplay muted loop></video>

  <div class="card">
    <img id="photo" src="hana.jpg">
    <p id="text3"></p>
    <button onclick="toS4()">next →</button>
  </div>

  <img src="hana2.jpeg" class="side-img" id="rightImg">

</div>

<!-- SCREEN 4 -->
<div id="s4" class="screen hidden">
  <div class="card">
    <h1>🎉 Your Day</h1>
    <p id="text4"></p>
    <button onclick="toS5()">next →</button>
  </div>
</div>

<!-- SCREEN 5 -->
<div id="s5" class="screen hidden">
  <div class="card">
    <p id="text5"></p>
    <button onclick="ending()">last →</button>
  </div>
</div>

<!-- END -->
<div id="end" class="screen hidden">
  <div class="card">
    <h1>🎂</h1>
    <p id="text6"></p>
  </div>
</div>

<script>
let music=document.getElementById("bgm");
let cover=document.getElementById("cover");

function typeEffect(text, id){
  let i=0;
  let el=document.getElementById(id);
  el.innerHTML="";
  function typing(){
    if(i<text.length){
      el.innerHTML+=text.charAt(i);
      i++;
      setTimeout(typing,40);
    }
  }
  typing();
}

function show(n,c){
  document.getElementById(c).classList.add("hidden");
  document.getElementById(n).classList.remove("hidden");
}

function start(){
  music.play();
  cover.style.animationPlayState="running";

  show("s2","s1");
  typeEffect("I got something for you… just open it.","text2");
}

function toS3(){
  show("s3","s2");

  typeEffect("I don’t know why… but somehow, you’re still my favorite.","text3");

  setTimeout(()=>{
    document.getElementById("photo").classList.add("clear");
    document.getElementById("leftVid").classList.add("show");
    document.getElementById("rightImg").classList.add("show");
  },500);
}

function toS4(){
  show("s4","s3");
  typeEffect("I hope all the good things find their way to you… not just today, but always.","text4");
}

function toS5(){
  show("s5","s4");
  typeEffect("Sorry I couldn’t meet you… I had something to take care of, so I made this for you. Hope you like it 🙂","text5");
}

function ending(){
  show("end","s5");
  typeEffect("Once again… Happy Birthday. you mean more than I say 🫶","text6");
}

typeEffect("I got something for you…","text1");
</script>

</body>
</html>
