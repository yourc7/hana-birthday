<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Hana 🎂</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#ffd6e0,#ffeaf4);
  background-attachment:fixed;
  overflow:hidden;
}

/* BACKGROUND GLOW */
body::before{
  content:"";
  position:fixed;
  width:600px;
  height:600px;
  background:radial-gradient(circle, rgba(255,77,109,0.2), transparent);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* SCREEN */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
.active{display:flex;}

/* 💎 PREMIUM GLOSSY CARD */
.card{
  position:relative;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:25px;
  width:90%;
  max-width:350px;
  text-align:center;

  border:1px solid rgba(255,255,255,0.4);
  box-shadow:
    0 10px 30px rgba(0,0,0,0.1),
    inset 0 1px 0 rgba(255,255,255,0.6),
    inset 0 -2px 10px rgba(255,255,255,0.2);

  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

h1{color:#ff4d6d;font-weight:600;}
p{margin-top:10px;color:#444;}

/* BUTTON */
button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}

/* FOTO */
#photo{
  width:220px;
  border-radius:15px;
  filter:blur(10px);
  transition:1.5s;
}
#photo.clear{filter:blur(0);}

/* MEDIA */
.side-video{
  position:absolute;
  left:5%;
  width:200px;
  border-radius:15px;
}
.side-img{
  position:absolute;
  right:5%;
  width:180px;
  border-radius:15px;
}

/* PLAYER */
.music-player{
  position:fixed;
  bottom:15px;
  left:15px;
  display:flex;
  align-items:center;
  gap:10px;
  background:rgba(255,255,255,0.4);
  backdrop-filter:blur(10px);
  padding:10px 15px;
  border-radius:20px;
}

.music-player img{
  width:50px;
  height:50px;
  border-radius:50%;
  animation:spin 8s linear infinite;
  animation-play-state: paused;
}

@keyframes spin{
  from{transform:rotate(0);}
  to{transform:rotate(360deg);}
}

/* MOBILE */
@media(max-width:768px){
  .side-video,.side-img{
    position:relative;
    width:85%;
  }
}

/* POPUP */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}
.popup img{max-width:90%;}
</style>
</head>

<body>

<audio id="bgm" loop>
  <source src="lagu.mp3">
</audio>

<div class="music-player">
  <img src="cover.jpg" id="cover">
  <div>
    <b>Risk It All</b>
    <p style="font-size:12px">Bruno Mars</p>
  </div>
</div>

<div class="popup" id="popup" onclick="closePopup()">
  <img id="popupImg">
</div>

<!-- S1 -->
<div id="s1" class="screen active">
  <div class="card">
    <h1>🎂 Happy Birthday Hana</h1>
    <p id="text1"></p>
    <button onclick="next()">open</button>
  </div>
</div>

<!-- S2 -->
<div id="s2" class="screen">
  <div class="card">
    <p id="text2"></p>
    <button onclick="next()">next</button>
  </div>
</div>

<!-- S3 -->
<div id="s3" class="screen">

  <video src="vid.mp4" class="side-video" autoplay muted loop></video>

  <div class="card" id="draggable">
    <img id="photo" src="hana.jpg" onclick="openPopup(this.src)">
    <p id="text3"></p>
    <button onclick="next()">next</button>
  </div>

  <img src="hana2.jpeg" class="side-img" onclick="openPopup(this.src)">
</div>

<!-- S4 -->
<div id="s4" class="screen">
  <div class="card">
    <p id="text4"></p>
    <button onclick="next()">next</button>
  </div>
</div>

<!-- S5 -->
<div id="s5" class="screen">
  <div class="card">
    <p id="text5"></p>
    <button onclick="next()">last</button>
  </div>
</div>

<!-- S6 -->
<div id="s6" class="screen">
  <div class="card">
    <p id="text6"></p>
  </div>
</div>

<script>
let screens=["s1","s2","s3","s4","s5","s6"];
let current=0;

function show(i){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(screens[i]).classList.add("active");
}

function next(){
  if(current<screens.length-1){
    current++;
    show(current);
    runText();
  }
}

/* TEXT */
function typeEffect(t,id){
  let i=0;
  let el=document.getElementById(id);
  el.innerHTML="";
  function type(){
    if(i<t.length){
      el.innerHTML+=t[i];
      i++;
      setTimeout(type,30);
    }
  }
  type();
}

function runText(){
  if(current==0) typeEffect("I got something for you…","text1");
  if(current==1) typeEffect("Today is all about you.","text2");
  if(current==2){
    typeEffect("I don’t know why… but somehow, you’re still my favorite.","text3");
    document.getElementById("photo").classList.add("clear");
  }
  if(current==3) typeEffect("I hope all the good things find their way to you… not just today, but always.","text4");
  if(current==4) typeEffect("Sorry I couldn’t meet you… I had something to take care of, so I made this for you. Hope you like it🙂‍↔️","text5");
  if(current==5) typeEffect("Once again… Happy Birthday yaa swithirt. you mean more than I say🫶","text6");
}

/* DRAG */
let card=document.getElementById("draggable");
let isDown=false,startX;

card?.addEventListener("mousedown",e=>{
  isDown=true;
  startX=e.clientX;
});
document.addEventListener("mousemove",e=>{
  if(!isDown) return;
  let move=e.clientX-startX;
  card.style.transform=`translateX(${move}px)`;
});
document.addEventListener("mouseup",()=>isDown=false);

card?.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});
card?.addEventListener("touchmove",e=>{
  let move=e.touches[0].clientX-startX;
  card.style.transform=`translateX(${move}px)`;
});

/* POPUP */
function openPopup(src){
  document.getElementById("popupImg").src=src;
  document.getElementById("popup").style.display="flex";
}
function closePopup(){
  document.getElementById("popup").style.display="none";
}

runText();

/* MUSIC */
let music=document.getElementById("bgm");
let cover=document.getElementById("cover");

document.body.addEventListener("click",()=>{
  music.play();
  cover.style.animationPlayState="running";
},{once:true});
</script>

</body>
</html>
