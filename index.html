<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Hana 🎂</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

body{
  height:100vh;
  overflow:hidden;
  background:linear-gradient(135deg,#ffd6e0,#ffeaf4);
}

/* BACKGROUND GLOW */
body::after{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle, rgba(255,77,109,0.2), transparent);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* SCREEN */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:0.6s;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.4);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 40px rgba(255,77,109,0.2);
  max-width:350px;
  text-align:center;
  z-index:2;
}

/* TEXT */
h1{color:#ff4d6d;}
p{margin-top:10px;color:#444;}

/* BUTTON */
button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
  transition:0.2s;
}
button:hover{transform:scale(1.05);}

/* HIDDEN */
.hidden{
  opacity:0;
  pointer-events:none;
  transform:scale(0.9);
}

/* FOTO TENGAH */
#photo{
  width:220px;
  border-radius:15px;
  filter:blur(10px);
  transition:1.5s;
}
#photo.clear{
  filter:blur(0);
}

/* FOTO SAMPING */
.side-img{
  position:absolute;
  width:180px;
  border-radius:15px;
  opacity:0;
  filter:blur(3px);
  top:50%;
  transform:translateY(-50%);
  transition:1s;
}

.left{ left:8%; transform:translateY(-50%) translateX(-50px) rotate(-8deg); }
.right{ right:8%; transform:translateY(-50%) translateX(50px) rotate(8deg); }

.side-img.show{
  opacity:0.7;
  transform:translateY(-50%) translateX(0) rotate(0);
}

/* PLAYER */
.music-player{
  position:fixed;
  bottom:20px;
  left:20px;
  display:flex;
  gap:10px;
  background:rgba(255,255,255,0.4);
  backdrop-filter:blur(10px);
  padding:10px 15px;
  border-radius:20px;
}

.music-player img{
  width:50px;
  height:50px;
  border-radius:50%;
  animation:spin 8s linear infinite, pulse 2s infinite;
  animation-play-state: paused;
}

@keyframes spin{
  from{transform:rotate(0);}
  to{transform:rotate(360deg);}
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<audio id="bgm" loop>
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<div class="music-player">
  <img src="cover.jpg" id="cover">
  <div>
    <h4>Risk It All</h4>
    <p>Bruno Mars</p>
  </div>
</div>

<!-- SCREEN 1 -->
<div id="s1" class="screen">
  <div class="card">
    <h1>🎂 Happy Birthday, Hana</h1>
    <p id="text1"></p>
    <button onclick="start()">open 🎁</button>
  </div>
</div>

<!-- SCREEN 2 -->
<div id="s2" class="screen hidden">
  <div class="card">
    <p id="text2"></p>
    <button onclick="toS3()">next →</button>
  </div>
</div>

<!-- SCREEN 3 -->
<div id="s3" class="screen hidden">
  <img src="foto1.jpg" class="side-img left" id="leftImg">
  
  <div class="card">
    <img id="photo" src="hana.jpg">
    <p id="text3"></p>
    <button onclick="toS4()">next →</button>
  </div>

  <img src="foto2.jpg" class="side-img right" id="rightImg">
</div>

<!-- SCREEN 4 -->
<div id="s4" class="screen hidden">
  <div class="card">
    <h1>🎉 Your Day</h1>
    <p id="text4"></p>
    <button onclick="toS5()">next →</button>
  </div>
</div>

<!-- SCREEN 5 -->
<div id="s5" class="screen hidden">
  <div class="card">
    <p id="text5"></p>
    <button onclick="ending()">last →</button>
  </div>
</div>

<!-- END -->
<div id="end" class="screen hidden">
  <div class="card">
    <h1>🎂</h1>
    <p id="text6"></p>
  </div>
</div>

<script>
let music=document.getElementById("bgm");
let cover=document.getElementById("cover");

function typeEffect(text, elementId, speed=40){
  let i=0;
  let el=document.getElementById(elementId);
  el.innerHTML="";
  function typing(){
    if(i<text.length){
      el.innerHTML+=text.charAt(i);
      i++;
      setTimeout(typing,speed);
    }
  }
  typing();
}

function show(next,current){
  document.getElementById(current).classList.add("hidden");
  document.getElementById(next).classList.remove("hidden");
}

function start(){
  music.play();
  cover.style.animationPlayState="running";

  show("s2","s1");
  typeEffect("Today is all about you.", "text2");
}

function toS3(){
  show("s3","s2");

  typeEffect("I don’t know why… but somehow, you’re still my favorite. Sorry I couldn’t meet you… I had something to take care of, so I made this for you.","text3");

  setTimeout(()=>{
    document.getElementById("photo").classList.add("clear");
    document.getElementById("leftImg").classList.add("show");
    document.getElementById("rightImg").classList.add("show");
  },400);
}

function toS4(){
  show("s4","s3");
  typeEffect("I hope all the good things find their way to you… not just today, but always.","text4");
}

function toS5(){
  show("s5","s4");
  typeEffect("I won’t say much… but I think you already get it.","text5");
}

function ending(){
  show("end","s5");
  typeEffect("Once again… Happy Birthday yaa swithirt. maybe you mean more than I say🫶.","text6");
}

// first screen typing
typeEffect("I got something for you… just open it.","text1");;
</script>

</body>
</html>
