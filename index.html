<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Hana 🎂</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

body{
  background:linear-gradient(135deg,#ffd6e0,#ffeaf4);
}

/* SCREEN */
.screen{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.15);
  max-width:350px;
  width:90%;
  text-align:center;
  z-index:2;
}

/* TEXT */
h1{color:#ff4d6d;}
p{margin-top:10px;color:#444;}

/* BUTTON */
button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
}

/* HIDDEN */
.hidden{display:none;}

/* FOTO */
#photo{
  width:70%;
  max-width:230px;
  border-radius:15px;
  filter:blur(10px);
  transition:1.5s;
}
#photo.clear{filter:blur(0);}

/* SIDE MEDIA DEFAULT (PC) */
.side-video,
.side-img{
  position:absolute;
  width:200px;
  border-radius:15px;
  opacity:0;
  top:50%;
  transition:1s;
}

.side-video{
  left:5%;
  transform:translateY(-50%) translateX(-80px);
}

.side-img{
  right:5%;
  transform:translateY(-50%) translateX(80px);
}

.side-video.show,
.side-img.show{
  opacity:0.8;
  transform:translateY(-50%) translateX(0);
}

/* ================= MOBILE ================= */
@media (max-width:768px){

  .screen{
    flex-direction:column;
    gap:15px;
    padding:20px;
  }

  /* ubah jadi normal flow */
  .side-video,
  .side-img{
    position:relative;
    top:auto;
    left:auto;
    right:auto;
    transform:none;
    width:90%;
    opacity:1;
  }

  .side-video.show,
  .side-img.show{
    transform:none;
  }

  #photo{
    width:80%;
  }
}

/* PLAYER */
.music-player{
  position:fixed;
  bottom:10px;
  left:10px;
  background:rgba(255,255,255,0.4);
  padding:8px 12px;
  border-radius:20px;
  display:flex;
  gap:10px;
}

.music-player img{
  width:40px;
  border-radius:50%;
  animation:spin 8s linear infinite;
  animation-play-state: paused;
}

@keyframes spin{
  from{transform:rotate(0);}
  to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<audio id="bgm" loop>
  <source src="lagu.mp3">
</audio>

<div class="music-player">
  <img src="cover.jpg" id="cover">
  <div>
    <p>Risk It All</p>
  </div>
</div>

<!-- S1 -->
<div id="s1" class="screen">
  <div class="card">
    <h1>🎂 Happy Birthday Hana</h1>
    <p id="text1"></p>
    <button onclick="start()">open</button>
  </div>
</div>

<!-- S2 -->
<div id="s2" class="screen hidden">
  <div class="card">
    <p id="text2"></p>
    <button onclick="toS3()">next</button>
  </div>
</div>

<!-- S3 -->
<div id="s3" class="screen hidden">

  <video src="vid.mp4" class="side-video" id="leftVid" autoplay muted loop></video>

  <div class="card">
    <img id="photo" src="hana.jpg">
    <p id="text3"></p>
    <button onclick="toS4()">next</button>
  </div>

  <img src="hana2.jpeg" class="side-img" id="rightImg">

</div>

<!-- S4 -->
<div id="s4" class="screen hidden">
  <div class="card">
    <p id="text4"></p>
    <button onclick="toS5()">next</button>
  </div>
</div>

<!-- S5 -->
<div id="s5" class="screen hidden">
  <div class="card">
    <p id="text5"></p>
    <button onclick="ending()">last</button>
  </div>
</div>

<!-- END -->
<div id="end" class="screen hidden">
  <div class="card">
    <p id="text6"></p>
  </div>
</div>

<script>
let music=document.getElementById("bgm");
let cover=document.getElementById("cover");

function typeEffect(t,id){
  let i=0;
  let el=document.getElementById(id);
  el.innerHTML="";
  function type(){
    if(i<t.length){
      el.innerHTML+=t[i];
      i++;
      setTimeout(type,30);
    }
  }
  type();
}

function show(n,c){
  document.getElementById(c).classList.add("hidden");
  document.getElementById(n).classList.remove("hidden");
}

function start(){
  music.play();
  cover.style.animationPlayState="running";
  show("s2","s1");
  typeEffect("I got something for you…","text2");
}

function toS3(){
  show("s3","s2");
  typeEffect("you’re still my favorite.","text3");

  document.getElementById("photo").classList.add("clear");
  document.getElementById("leftVid").classList.add("show");
  document.getElementById("rightImg").classList.add("show");
}

function toS4(){
  show("s4","s3");
  typeEffect("I hope all good things come to you.","text4");
}

function toS5(){
  show("s5","s4");
  typeEffect("I made this for you.","text5");
}

function ending(){
  show("end","s5");
  typeEffect("Happy Birthday 🤍","text6");
}

typeEffect("I got something for you…","text1");
</script>

</body>
</html>
