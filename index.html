<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Hana 🎂</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

body{
  background:linear-gradient(135deg,#ffd6e0,#ffeaf4);
  overflow:hidden;
}

/* PROGRESS BAR */
.progress{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:5px;
  display:flex;
  gap:3px;
  padding:5px;
}

.bar{
  flex:1;
  height:100%;
  background:rgba(255,255,255,0.4);
  border-radius:5px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:white;
  transition:width linear;
}

/* SCREEN */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:15px;
  padding:20px;
}
.active{display:flex;}

/* CARD */
.card{
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  max-width:350px;
  width:90%;
  text-align:center;
}

/* BUTTON */
button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
}

/* MEDIA */
#photo{
  width:70%;
  border-radius:15px;
  filter:blur(10px);
  transition:1.5s;
}
#photo.clear{filter:blur(0);}

.side-video,.side-img{
  width:90%;
  border-radius:15px;
}

/* PLAYER */
.music-player{
  position:fixed;
  bottom:10px;
  left:10px;
  background:rgba(255,255,255,0.4);
  padding:8px 12px;
  border-radius:20px;
  display:flex;
  gap:10px;
}

.music-player img{
  width:40px;
  border-radius:50%;
  animation:spin 8s linear infinite;
  animation-play-state: paused;
}

@keyframes spin{
  from{transform:rotate(0);}
  to{transform:rotate(360deg);}
}

/* POPUP */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}
.popup img{
  max-width:90%;
}
</style>
</head>

<body>

<!-- PROGRESS -->
<div class="progress">
  <div class="bar"><div class="fill" id="p0"></div></div>
  <div class="bar"><div class="fill" id="p1"></div></div>
  <div class="bar"><div class="fill" id="p2"></div></div>
  <div class="bar"><div class="fill" id="p3"></div></div>
  <div class="bar"><div class="fill" id="p4"></div></div>
  <div class="bar"><div class="fill" id="p5"></div></div>
</div>

<audio id="bgm" loop>
  <source src="lagu.mp3">
</audio>

<div class="music-player">
  <img src="cover.jpg" id="cover">
  <div><p>Risk It All</p></div>
</div>

<div class="popup" id="popup" onclick="closePopup()">
  <img id="popupImg">
</div>

<!-- SCREENS -->
<div id="s1" class="screen active">
  <div class="card">
    <h1>🎂 Happy Birthday Hana</h1>
    <p id="text1"></p>
  </div>
</div>

<div id="s2" class="screen">
  <div class="card"><p id="text2"></p></div>
</div>

<div id="s3" class="screen">
  <video src="vid.mp4" class="side-video" autoplay muted loop onclick="toggleVideo(this)"></video>
  <div class="card">
    <img id="photo" src="hana.jpg" onclick="openPopup(this.src)">
    <p id="text3"></p>
  </div>
  <img src="hana2.jpeg" class="side-img" onclick="openPopup(this.src)">
</div>

<div id="s4" class="screen">
  <div class="card"><p id="text4"></p></div>
</div>

<div id="s5" class="screen">
  <div class="card"><p id="text5"></p></div>
</div>

<div id="s6" class="screen">
  <div class="card"><p id="text6"></p></div>
</div>

<script>
let screens=["s1","s2","s3","s4","s5","s6"];
let current=0;
let duration=4000; // durasi tiap slide
let timer;
let paused=false;

function showScreen(i){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(screens[i]).classList.add("active");
  runText();
  startProgress(i);
}

function next(){
  if(current<screens.length-1){
    current++;
    showScreen(current);
  }
}

function prev(){
  if(current>0){
    current--;
    showScreen(current);
  }
}

/* PROGRESS */
function startProgress(i){
  clearInterval(timer);
  let fill=document.getElementById("p"+i);
  document.querySelectorAll(".fill").forEach(f=>f.style.width="0%");
  let w=0;

  timer=setInterval(()=>{
    if(!paused){
      w+=100/(duration/50);
      fill.style.width=w+"%";
      if(w>=100){
        clearInterval(timer);
        next();
      }
    }
  },50);
}

/* SWIPE */
let startX=0;
document.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
  paused=true;
});
document.addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;
  paused=false;
  if(endX-startX>50) prev();
  if(startX-endX>50) next();
});

/* CLICK NAV */
document.addEventListener("click",e=>{
  if(e.clientX < window.innerWidth/2) prev();
  else next();
});

/* TEXT */
function typeEffect(t,id){
  let i=0;
  let el=document.getElementById(id);
  if(!el) return;
  el.innerHTML="";
  function type(){
    if(i<t.length){
      el.innerHTML+=t[i];
      i++;
      setTimeout(type,25);
    }
  }
  type();
}

function runText(){
  if(current==0) typeEffect("I got something for you…","text1");
  if(current==1) typeEffect("Today is all about you.","text2");
  if(current==2){
    typeEffect("I don’t know why… but somehow, you’re still my favorite.","text3");
    document.getElementById("photo").classList.add("clear");
  }
  if(current==3) typeEffect("I hope all the good things find their way to you… not just today, but always.","text4");
  if(current==4) typeEffect("Sorry I couldn’t meet you… I had something to take care of, so I made this for you. Hope you like it🙂‍↔️","text5");
  if(current==5) typeEffect("Once again… Happy Birthday yaa swithirt. you mean more than I say🫶","text6");
}

/* MEDIA */
function toggleVideo(v){
  v.muted = !v.muted;
}

function openPopup(src){
  document.getElementById("popupImg").src=src;
  document.getElementById("popup").style.display="flex";
}
function closePopup(){
  document.getElementById("popup").style.display="none";
}

/* START */
showScreen(0);

let music=document.getElementById("bgm");
let cover=document.getElementById("cover");

document.body.addEventListener("click",()=>{
  music.play();
  cover.style.animationPlayState="running";
},{once:true});
</script>

</body>
</html>
